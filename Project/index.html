<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="project.js" defer></script>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/frappe-charts@1.6.2/dist/frappe-charts.min.umd.js"></script>
  <title>Weather application</title>
</head>
<body>
  
  <main>

    <div class="search-bar">
      <div id="search-row">
        <input type="text" placeholder="City">
        <button id="city-search-button">Search</button>
      </div>
      <div id="buttons-row">
        <button id="current-location-button">Use Current Location</button>
        <button id="add-favorite-button">☆ Add to Favorites</button>
        <select id="favorites-menu">
          <option value="">My Favorites</option>
        </select>
      </div>
    </div>

    <h1 id="place"></h1>

    <div id="weather-reports"></div>

    <div id="chart"></div>

    <div id="chart-toggle">
      <button id="show-24h-button">24 Hours</button>
      <button id="show-7day-button">7 Days</button>
    </div>

  </main>

</body>
</html>
